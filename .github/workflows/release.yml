name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: false
        type: choice
        default: "release"
        options:
          - release
          - beta
          - alpha

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -Pmod_version=${{ inputs.version }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          else
            CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi
          {
            echo "### ✨ 新功能"
            echo "$CHANGELOG" | grep -E "^- feat(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🐛 修复"
            echo "$CHANGELOG" | grep -E "^- fix(\(.*\))?:" || echo "无"
            echo ""
            echo "### 📝 文档"
            echo "$CHANGELOG" | grep -E "^- docs(\(.*\))?:" || echo "无"
            echo ""
            echo "### ♻️ 重构 / 代码风格"
            echo "$CHANGELOG" | grep -E "^- refactor(\(.*\))?:" || echo "无"
            echo "$CHANGELOG" | grep -E "^- style(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🧪 测试"
            echo "$CHANGELOG" | grep -E "^- test(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🔧 构建 / 杂项"
            echo "$CHANGELOG" | grep -E "^- ci(\(.*\))?:" || echo "无"
            echo "$CHANGELOG" | grep -E "^- chore(\(.*\))?:" || echo "无"
            echo ""
            echo "### ⚡ 性能优化"
            echo "$CHANGELOG" | grep -E "^- perf(\(.*\))?:" || echo "无"
            echo ""
            echo "### 🚨 破坏性变更"
            echo "$CHANGELOG" | grep -E "!:" || echo "无"
          } > changelog.md
          cat changelog.md
          {
            echo "changelog<<EOF"
            cat changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Build sources JAR
        run: ./gradlew sourcesJar -Pmod_version=${{ inputs.version }}

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRE_RELEASE_FLAG=""
          if [[ "${{ inputs.channel }}" == "beta" ]] || [[ "${{ inputs.channel }}" == "alpha" ]]; then
            PRE_RELEASE_FLAG="--prerelease"
          fi
          gh release create v${{ inputs.version }} \
            build/libs/physics-parallelization-*.jar \
            --title "v${{ inputs.version }}" \
            --notes-file changelog.md \
            $PRE_RELEASE_FLAG
